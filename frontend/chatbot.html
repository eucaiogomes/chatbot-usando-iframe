<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistente Virtual</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Variables ─────────────────────────────────── */
    :root {
      --bg-base:      #0a0c10;
      --bg-panel:     #10131a;
      --bg-card:      #161b26;
      --bg-input:     #1c2233;
      --border:       #252d40;
      --accent:       #4f8cff;
      --accent-glow:  rgba(79, 140, 255, 0.18);
      --accent-dim:   #2a4a8a;
      --user-bubble:  #1a3a6e;
      --bot-bubble:   #161b26;
      --text-primary: #e8eaf0;
      --text-sec:     #8b95ad;
      --text-muted:   #4a5568;
      --success:      #34d399;
      --radius-lg:    18px;
      --radius-sm:    10px;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --shadow:       0 8px 40px rgba(0,0,0,0.6);
    }

    /* ─── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg-base);
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Subtle animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,140,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── App Shell ─────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0;
    }

    /* ─── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--accent-glow);
      animation: pulse-ring 2.8s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 3px var(--accent-glow); }
      50%       { box-shadow: 0 0 0 7px rgba(79,140,255,0.08); }
    }

    .header-info h1 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sec);
      font-weight: 300;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── Messages Area ─────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* ─── Message Rows ──────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: slideUp 0.3s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    /* Small avatar icon in rows */
    .msg-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .msg-row.user .msg-icon {
      background: var(--user-bubble);
      border: 1px solid var(--accent-dim);
    }

    .msg-row.bot .msg-icon {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
    }

    /* ─── Bubbles ───────────────────────────────────────── */
    .bubble {
      max-width: 75%;
      padding: 13px 18px;
      border-radius: var(--radius-lg);
      font-size: 14.5px;
      line-height: 1.65;
      font-weight: 400;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--accent-dim);
      border-bottom-right-radius: 5px;
      color: #c8d8ff;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text-primary);
    }

    .bubble .time {
      display: block;
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ─── Typing Indicator ──────────────────────────────── */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-bounce 1.2s ease-in-out infinite both;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    /* ─── Welcome Message ───────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
      opacity: 0.85;
    }

    .welcome-icon {
      font-size: 40px;
      filter: drop-shadow(0 0 18px var(--accent));
    }

    .welcome h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-sec);
      max-width: 340px;
      line-height: 1.7;
    }

    /* ─── Input Area ────────────────────────────────────── */
    #input-area {
      padding: 16px 24px 20px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14.5px;
      font-weight: 400;
      resize: none;
      max-height: 130px;
      line-height: 1.55;
      /* single line by default, grows with content */
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #user-input::-webkit-scrollbar { width: 4px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(79,140,255,0.3);
    }

    #send-btn:hover:not(:disabled) {
      background: #6ba3ff;
      transform: scale(1.06);
      box-shadow: 0 4px 18px rgba(79,140,255,0.45);
    }

    #send-btn:active:not(:disabled) { transform: scale(0.96); }

    #send-btn:disabled {
      background: var(--accent-dim);
      cursor: not-allowed;
      box-shadow: none;
      opacity: 0.6;
    }

    #send-btn svg { width: 18px; height: 18px; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-left: 4px;
    }

    /* ─── Error Bubble ──────────────────────────────────── */
    .bubble.error {
      border-color: rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.08);
      color: #fca5a5;
    }

    /* ─── Responsive ────────────────────────────────────── */
    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      #messages { padding: 20px 14px; }
      #input-area { padding: 12px 14px 16px; }
      .bubble { max-width: 88%; font-size: 14px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ───────────────────────────────── -->
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Assistente Virtual</h1>
      <div class="status">
        <span class="status-dot"></span>
        Online · Pronto para ajudar
      </div>
    </div>
  </header>

  <!-- ── Messages ─────────────────────────────── -->
  <div id="messages">
    <!-- Welcome state (some before first message) -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✨</div>
      <h2>Como posso ajudar?</h2>
      <p>Sou um assistente com inteligência artificial. Faça sua pergunta e responderei o mais breve possível.</p>
    </div>
  </div>

  <!-- ── Input Area ────────────────────────────── -->
  <div id="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Digite sua mensagem…"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" aria-label="Enviar mensagem">
        <!-- Send icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter para enviar &nbsp;·&nbsp; Shift+Enter para nova linha</p>
  </div>

</div>

<script>
  /* ─────────────────────────────────────────────────────────
   *  CONFIGURAÇÃO
   *  Altere BACKEND_URL para o endereço onde seu server.js
   *  está hospedado (ex: https://meu-bot.onrender.com).
   *  Em desenvolvimento local use http://localhost:3001
   * ───────────────────────────────────────────────────────── */
  const BACKEND_URL = 'http://localhost:3001';

  /* ─── Estado ──────────────────────────────────────────── */
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const welcomeEl   = document.getElementById('welcome');
  let   isLoading   = false;

  /* ─── Auto-resize textarea ────────────────────────────── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  /* ─── Envio via Enter (Shift+Enter = nova linha) ─────── */
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  /* ─── Scroll automático para o final ─────────────────── */
  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  /* ─── Formata hora atual ──────────────────────────────── */
  function currentTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  /* ─── Renderiza uma mensagem na tela ─────────────────── */
  function appendMessage(text, role, isError = false) {
    // Remove welcome screen na primeira mensagem
    if (welcomeEl) welcomeEl.style.display = 'none';

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = `bubble${isError ? ' error' : ''}`;

    // Converte \n em <br> para quebras de linha
    const safeText = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    bubble.innerHTML = safeText.replace(/\n/g, '<br>');

    const timeSpan = document.createElement('span');
    timeSpan.className = 'time';
    timeSpan.textContent = currentTime();
    bubble.appendChild(timeSpan);

    row.appendChild(icon);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  /* ─── Mostra/remove indicador de digitação ───────────── */
  function showTyping() {
    if (welcomeEl) welcomeEl.style.display = 'none';

    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>`;

    row.appendChild(icon);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  /* ─── Lógica principal de envio ───────────────────────── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Bloqueia input
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    // Exibe mensagem do usuário
    appendMessage(text, 'user');

    // Limpa input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Exibe indicador de digitação
    showTyping();

    try {
      /* Chama o backend — a API KEY fica protegida no servidor */
      const response = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await response.json();

      removeTyping();

      if (!response.ok) {
        // Erro retornado pelo backend
        const errMsg = data.error || 'Erro ao processar sua mensagem. Tente novamente.';
        appendMessage(`⚠️ ${errMsg}`, 'bot', true);
      } else {
        appendMessage(data.reply, 'bot');
      }

    } catch (err) {
      // Erro de rede / backend offline
      removeTyping();
      appendMessage(
        '⚠️ Não consegui me conectar ao servidor. Verifique se o backend está online.',
        'bot',
        true
      );
      console.error('[Chatbot] Erro de rede:', err);
    } finally {
      // Libera input
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
